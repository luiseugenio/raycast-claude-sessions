<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Flat rounded-square background in Claude's orange -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="#D97757"/>

  <!-- Chat-bubble motif: a session/conversation -->
  <path d="
    M 146 118
    H 366
    a 48 48 0 0 1 48 48
    V 296
    a 48 48 0 0 1 -48 48
    H 224
    L 156 392
    a 10 10 0 0 1 -16 -8
    L 142 344
    H 146
    a 48 48 0 0 1 -48 -48
    V 166
    a 48 48 0 0 1 48 -48
    Z"
    fill="#FFFFFF"/>

  <!-- Terminal chevron + underscore inside the bubble: the CLI/session prompt -->
  <path d="M 208 178 L 268 232 L 208 286"
